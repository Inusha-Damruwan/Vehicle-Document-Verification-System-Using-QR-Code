<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Police Officer Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: url('../assets/backgroundimage.avif') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: rgba(0, 0, 0, 0.75);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      max-width: 400px;
      width: 100%;
      color: white;
    }

    .login-box h2, .login-box h3 {
      text-align: center;
      margin-bottom: 15px;
    }

    .login-box h2 {
      font-size: 28px;
    }

    .login-box h3 {
      font-size: 22px;
      color: #ccc;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
    }

    .links {
      margin-top: 15px;
      text-align: center;
    }

    .links a {
      color: #4da6ff;
      text-decoration: none;
      display: inline-block;
      margin: 5px 0;
    }

    .links a:hover {
      text-decoration: underline;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: #007BFF;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    @media screen and (max-width: 480px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h2>VEHICLE DOCUMENT</h2>
      <h3>POLICE OFFICER LOGIN</h3>

      <form id="loginForm" action="../process.php" method="post">
        <label for="policeId">Police ID</label>
        <input type="text" id="policeId" name="policeId" placeholder="Enter Police ID" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>

        <button type="submit" name = "officer_login">SIGN IN</button>

        <div class="links">
          <a href="Officer_Register_Page.html">Register</a><br>
          <a href="Forgot password page.html">Forgotten Password?</a>
        </div>

      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      // Here you can add login validation logic if needed
      // e.g., check hardcoded credentials or call an API
    });
  </script>
</body>
</html>
