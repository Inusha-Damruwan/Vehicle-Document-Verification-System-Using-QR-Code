<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: url('../assets/backgroundimage.avif') no-repeat center center fixed;
      background-size: cover;
      background-color: #f0f4f8;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .forgot-password-container {
      background-color: #6792e8;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .forgot-password-container h1 {
      text-align: center;
      color: #0c0c0c;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .forgot-password-container p {
      text-align: center;
      color: #f0f0f0;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #fff;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #003366;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005bb5;
    }

    .back-to-login {
      text-align: center;
      margin-top: 20px;
    }

    .back-to-login a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .back-to-login a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="forgot-password-container">
    <h1>Forgot Your Password?</h1>
    <p>Enter your email address to receive a password reset link.</p>
    
    <form id="reset-password-form" onsubmit="submitForm(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email" />
      </div>

      <button type="submit">Submit</button>
      
      <p class="back-to-login"><a href="Owner_Login_Page.html">Back to Login</a></p>
    </form>
  </div>

  <script>
    function submitForm(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      alert("Password reset link sent to: " + email);
    }
  </script>
</body>
</html>
